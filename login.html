                    </div>
                </div>
                <div class="space-y-2">
                    <label
                        class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">E-mail</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
                        <input id="register-email"
                            class="w-full bg-surface-container-highest/30 border-b border-outline-variant focus:border-primary outline-none py-3 pl-10 pr-4 rounded-t-lg font-body-md text-body-md transition-all focus:bg-surface-container-highest/50"
                            placeholder="nome@exemplo.com" type="email" required />
                    </div>
                </div>
                <div class="space-y-2">
                    <label

                    <div class="relative group">

                            fill="#FBBC05"></path>

    <!-- Bottom Navigation Bar -->
    <nav
        class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 py-4 bg-surface-container/5 backdrop-blur-2xl border-t border-white/5 shadow-[0_-4px_20px_rgba(45,91,255,0.1)] rounded-t-xl">

            <span class="font-label-md text-label-md">Entrar</span>
        </button>
        <button
            class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 duration-200"
            id="nav-btn-register" onclick="toggleTab('register')">
            <span class="material-symbols-outlined">person_add</span>
            <span class="font-label-md text-label-md">Criar Conta</span>
        </button>
    </nav>
    <script>
        function toggleTab(mode) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const tabIndicator = document.getElementById('tab-indicator');
            const tabLoginBtn = document.getElementById('tab-login-btn');
            const tabRegisterBtn = document.getElementById('tab-register-btn');

            const navLoginBtn = document.getElementById('nav-btn-login');
            const navRegisterBtn = document.getElementById('nav-btn-register');

            // Bottom Nav Logic
            const activeClasses = "flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-6 py-2";
            const inactiveClasses = "flex flex-col items-center justify-center text-on-surface-variant";

            if (mode === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                tabIndicator.style.transform = 'translateX(0)';

                tabLoginBtn.classList.add('text-on-primary-container');
                tabLoginBtn.classList.remove('text-on-surface-variant');
                tabRegisterBtn.classList.add('text-on-surface-variant');
                tabRegisterBtn.classList.remove('text-on-primary-container');

                navLoginBtn.className = activeClasses + " active:scale-90 duration-200 transition-all";
                navRegisterBtn.className = inactiveClasses + " hover:text-primary transition-colors active:scale-90 duration-200";
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                tabIndicator.style.transform = 'translateX(calc(100% + 4px))';

                tabRegisterBtn.classList.add('text-on-primary-container');
                tabRegisterBtn.classList.remove('text-on-surface-variant');
                tabLoginBtn.classList.add('text-on-surface-variant');
                tabLoginBtn.classList.remove('text-on-primary-container');

                navRegisterBtn.className = activeClasses + " active:scale-90 duration-200 transition-all";
                navLoginBtn.className = inactiveClasses + " hover:text-primary transition-colors active:scale-90 duration-200";
            }
        }

        // Form submission logic
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const errEl = document.getElementById('login-error');
            
            const { user, error } = await window.db.auth.signIn(email, pass);
            if (error) {
                errEl.innerText = error.message;
                errEl.classList.remove('hidden');
            } else {
                window.location.href = 'inicio.html';
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const pass = document.getElementById('register-password').value;
            const errEl = document.getElementById('register-error');

            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            if (!passwordRegex.test(pass)) {
                errEl.innerText = "A senha deve conter no mínimo 8 caracteres, uma letra maiúscula, uma minúscula, um número e um caractere especial.";
                errEl.classList.remove('hidden');
                errEl.classList.add('text-error');
                errEl.classList.remove('text-primary');
                return;
            }

            const { user, session, error } = await window.db.auth.signUp(email, pass, name);
            if (error) {
                errEl.innerText = error.message;
                errEl.classList.remove('hidden');
                errEl.classList.add('text-error');
                errEl.classList.remove('text-primary');
            } else {
                if (!session) {
                    // Confirmação de e-mail necessária
                    errEl.innerText = "Cadastro realizado! Por favor, verifique seu e-mail para confirmar a conta.";
                    errEl.classList.remove('hidden');
                    errEl.classList.remove('text-error');
                    errEl.classList.add('text-primary');
                } else {
                    // Se não precisar de confirmação, vai para o login
                    window.location.href = 'inicio.html';
                }
            }
        });

        document.getElementById('forgot-password').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            if (!email) {
                alert('Por favor, digite seu e-mail no campo acima para recuperar a senha.');
                return;
            }
            const { data, error } = await window.db.supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/login.html',
            });
            if (error) {
                alert('Erro ao enviar e-mail: ' + error.message);
            } else {
                alert('E-mail de recuperação enviado! Verifique sua caixa de entrada.');
            }
        });
    </script>
</body>
