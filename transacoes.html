    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const searchInput = document.getElementById('search-input');
            const transactionList = document.getElementById('transaction-list');

            let allTransactions = [];
            let allCards = [];
            let searchTerm = '';

            const iconMap = {
                'Alimentação': 'restaurant',
                'Lazer': 'sports_esports',
                'Serviços': 'build',
                'Educação': 'school',
                'Moradia': 'home_work',
                'Transporte': 'directions_car',
                'Saúde': 'local_hospital'
            };

            const getIcon = (cat) => iconMap[cat] || 'receipt_long';

            const getDateGroup = (dateStr) => {
                const d = new Date(dateStr + 'T00:00:00');
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const diff = Math.floor((today - d) / (1000 * 60 * 60 * 24));
                if (diff === 0) return 'Hoje';
                if (diff === 1) return 'Ontem';
                const monday = new Date(today);
                monday.setDate(today.getDate() - (today.getDay() || 7) + 1);
                if (d >= monday) return 'Esta Semana';
                return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
            };

            const formatCurrency = (val) => {
                return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0);
            };

            const render = () => {
                let filtered = allTransactions;
                if (searchTerm) {
                    const term = searchTerm.toLowerCase();
                    filtered = filtered.filter(t => {
                        const cartaoNome = t.cartao_id ? (allCards.find(c => c.id === t.cartao_id)?.nome || '').toLowerCase() : '';
                        return t.descricao.toLowerCase().includes(term) || 
                               t.categoria.toLowerCase().includes(term) ||
                               cartaoNome.includes(term);
                    });
                }

                const total = filtered.reduce((s, t) => s + Number(t.valor), 0);
                const gastos = filtered.reduce((s, t) => s + Math.abs(Math.min(0, Number(t.valor))), 0);
                const entradas = filtered.reduce((s, t) => s + Math.max(0, Number(t.valor)), 0);

                document.getElementById('saldo-disponivel').textContent = formatCurrency(total);
                document.getElementById('resumo-gastos').textContent = 'Gastos: ' + formatCurrency(gastos);
                document.getElementById('resumo-limite').textContent = 'Entradas: ' + formatCurrency(entradas);

                const pct = Math.min(100, (gastos / (entradas || 1)) * 100);
                const bar = document.querySelector('#saldo-disponivel').closest('.glass-card').querySelector('.luminous-gradient');
                if (bar) bar.style.width = pct + '%';

                if (filtered.length === 0) {
                    transactionList.innerHTML = `
                        <div class="text-center py-10">
                            <span class="material-symbols-outlined text-4xl text-on-surface-variant/50 mb-2">search_off</span>
                            <p class="font-body-md text-on-surface-variant">Nenhuma transação encontrada.</p>
                        </div>
                    `;
                    return;
                }

                const groups = {};
                for (const t of filtered) {
                    const label = getDateGroup(t.data.split('T')[0]);
                    if (!groups[label]) groups[label] = [];
                    groups[label].push(t);
                }

                const order = ['Hoje', 'Ontem', 'Esta Semana'];
                const sortedKeys = Object.keys(groups).sort((a, b) => {
                    const ia = order.indexOf(a);
                    const ib = order.indexOf(b);
                    if (ia !== -1 && ib !== -1) return ia - ib;
                    if (ia !== -1) return -1;
                    if (ib !== -1) return 1;
                    return new Date(groups[b][0].data) - new Date(groups[a][0].data);
                });

                transactionList.innerHTML = sortedKeys.map(key => `
                    <div class="space-y-stack-sm mt-4">
                        <h3 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest px-1">${key}</h3>
                        ${groups[key].map(t => {
                            const val = Number(t.valor);
                            const isExpense = val < 0;
                            const parcelasLabel = t.parcelas > 1 ? ` <span class="text-outline text-xs">(${t.parcelas}x)</span>` : '';
                            return `
                                <div class="glass-card rounded-xl p-4 flex items-center gap-4 mt-2">
                                    <div class="w-11 h-11 rounded-full bg-primary-container/20 flex items-center justify-center flex-shrink-0">
                                        <span class="material-symbols-outlined text-primary">${getIcon(t.categoria)}</span>
                                    </div>
                                    <div class="flex-1 min-w-0 pr-2">
                                        <p class="font-body-md text-body-md text-on-surface truncate">${t.descricao}${parcelasLabel}</p>
                                        <p class="font-label-sm text-label-sm text-on-surface-variant">${t.categoria}</p>
                                    </div>
                                    <div class="flex flex-col items-end shrink-0 gap-1">
                                        <span class="font-headline-md text-headline-md whitespace-nowrap ${isExpense ? 'text-red-400' : 'text-green-400'}">${formatCurrency(val)}</span>
                                        <button onclick="deleteTransaction('${t.id}')" class="text-error/70 hover:text-error text-xs flex items-center gap-1 active:scale-95 transition-all">
                                            <span class="material-symbols-outlined text-[14px]">delete</span> Excluir
                                        </button>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `).join('');
            };

            window.deleteTransaction = async (id) => {
                if (confirm('Tem certeza que deseja excluir esta transação?')) {
                    try {
                        await window.db.transacoes.remove(id);
                        allTransactions = allTransactions.filter(t => t.id !== id);
                        render();
                    } catch (err) {
                        alert('Erro ao excluir: ' + err.message);
                    }
                }
            };

            // Carregar foto no topo
            const savedProfilePic = localStorage.getItem('profile_picture');
            if (savedProfilePic) {
                const img = document.getElementById('profile-img-top');
                if (img) img.src = savedProfilePic;
            }

            try {
                const [tx, cards] = await Promise.all([
                    window.db.transacoes.list(),
                    window.db.cartoes.list()
                ]);
                allTransactions = tx;
                allCards = cards;
                render();
            } catch (err) {
                transactionList.innerHTML = `
                    <div class="text-center py-10">
                        <span class="material-symbols-outlined text-4xl text-on-surface-variant/50 mb-2">error</span>
                        <p class="font-body-md text-on-surface-variant">Erro ao carregar transações.</p>
                    </div>
                `;
            }

            let debounceTimer;
            searchInput.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    searchTerm = searchInput.value;
                    render();
                }, 300);
            });
        });
    </script>
