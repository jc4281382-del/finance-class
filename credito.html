    <script>
        let currentCards = [];
        let allTransactions = [];
        let activeCardIndex = 0;

        // formatCurrency já está declarado em app.js

        // Formata Data Didática
        function formatDate(dia) {
            const months = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
            const now = new Date();
            let month = now.getMonth();
            let year = now.getFullYear();
            if (dia <= now.getDate()) {
                month = (month + 1) % 12;
                if (month === 0) year++;
            }
            return `${dia} ${months[month]}`;
        }

        // Criar o Card HTML (Design FinPulse)
        function createCardSlide(card, isFirst, invoiceTotal) {
            const wrapper = document.createElement('div');
            // Design premium do FinPulse
            wrapper.className = 'snap-center shrink-0 w-[85vw] max-w-[340px] aspect-[1.586/1] rounded-2xl p-6 relative overflow-hidden shadow-2xl flex flex-col justify-between';
            if (isFirst) {
                wrapper.style.background = 'linear-gradient(135deg, #2d5bff 0%, #6e06d0 100%)';
            } else {
                wrapper.classList.add('glass-card');
            }
            
            // Círculos de luz
            const glow1 = document.createElement('div');
            glow1.className = 'absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3';
            wrapper.appendChild(glow1);

            // Row Superior: Logo FinPulse e Contactless
            const topRow = document.createElement('div');
            topRow.className = 'flex justify-between items-start z-10 w-full';
            topRow.innerHTML = `
                <span class="font-display-lg text-white text-2xl font-bold tracking-tight">${card.nome || 'FinPulse'}</span>
                <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center backdrop-blur-md">
                    <span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">contactless</span>
                </div>
            `;
            wrapper.appendChild(topRow);

            // Chip e Número do Cartão
            const midRow = document.createElement('div');
            midRow.className = 'z-10 mt-4';
            midRow.innerHTML = `
                <div class="w-12 h-8 bg-white/20 rounded-md backdrop-blur-md border border-white/10 mb-4"></div>
                <div class="text-white text-xl font-medium tracking-[0.2em]">•••• •••• •••• 8892</div>
            `;
            wrapper.appendChild(midRow);

            // Row Inferior: Nome e Validade
            const bottom = document.createElement('div');
            bottom.className = 'z-10 mt-auto flex justify-between items-end';
            const cardTitulares = JSON.parse(localStorage.getItem('card_titulares') || '{}');
            const cardTitular = cardTitulares[card.id] || 'ALEXANDER M. SILVA';

            bottom.innerHTML = `
                <div class="flex flex-col">
                    <span class="text-white/70 font-label-sm text-[10px] uppercase tracking-wider mb-0.5">Titular do Cartão</span>
                    <span class="text-white font-label-md text-sm tracking-widest">${cardTitular.toUpperCase()}</span>
                </div>
                <div class="text-right">
                    <p class="font-label-sm text-white/60 text-[10px] uppercase mb-1">Expires</p>
                    <p class="font-label-md text-white text-sm font-semibold">09/29</p>
                </div>
            `;
            wrapper.appendChild(bottom);

            return wrapper;
        }

        // Atualizar os detalhes do Cartão Ativo (Dinâmico)
        function updateActiveCardDetails() {
            if (!currentCards.length) return;
            const card = currentCards[activeCardIndex];

            const saldoEl = document.getElementById('saldo-disponivel');
            const utilizadoEl = document.getElementById('limite-utilizado');
            const totalEl = document.getElementById('limite-total');
            const progressBar = document.querySelector('.h-2.w-full .h-full');
            const invoiceListEl = document.getElementById('invoice-items-list');

            // Todas as transações deste cartão
            const cardTransacoes = allTransactions.filter(t => t.cartao_id === card.id);
            
            // Compras (valores negativos e não são pagamentos de parcela)
            const compras = cardTransacoes.filter(t => t.valor < 0 && (!t.descricao || !t.descricao.startsWith('Pgto Parcela')));
            
            // Pagamentos realizados para este cartão
            const pagamentos = cardTransacoes.filter(t => t.valor > 0 && t.descricao && t.descricao.startsWith('Pgto Parcela'));

            let itemsMarkup = '';

            compras.forEach(compra => {
                const valTotal = Math.abs(Number(compra.valor));
                const parcelasTotal = parseInt(compra.parcelas) || 1;
                const valParcela = valTotal / parcelasTotal;

                // Contar quantas parcelas já foram pagas buscando pelo ID da compra na descrição dos pagamentos
                const parcelasPagas = pagamentos.filter(p => p.descricao && p.descricao.includes(compra.id)).length;
                const parcelasRestantes = parcelasTotal - parcelasPagas;

                // Se já pagou tudo, não mostra na lista de ativos
                if (parcelasRestantes <= 0) return;

                const statusStr = parcelasTotal > 1 ? `Parcela atual ${parcelasPagas + 1}/${parcelasTotal}` : 'Parcela atual 1/1';
                // Usando a data original da compra ou vencimento fictício
                const vencimentoStr = compra.data ? formatDate(new Date(compra.data).getDate()) : '15';
                const descricaoTexto = compra.descricao || 'Compra sem descrição';

                itemsMarkup += `
                    <div class="glass-card p-4 rounded-xl flex items-center justify-between mt-3 border-b border-white/5 transition-all">
                        <div class="flex-1 min-w-0 pr-4">
                            <p class="font-label-md text-on-surface truncate font-semibold text-[15px]">${descricaoTexto}</p>
                            <p class="font-label-sm text-xs text-on-surface-variant/80 mt-1">Total: ${formatCurrency(valTotal)} em ${parcelasTotal}x</p>
                            <p class="font-label-sm text-xs text-on-surface-variant/80 mt-1">Vence dia ${vencimentoStr}</p>
                            <p class="font-label-sm text-[13px] text-tertiary mt-1.5 font-medium">Valor da parcela: ${formatCurrency(valParcela)}</p>
                            <p class="font-label-sm text-[11px] text-primary mt-1">${statusStr}</p>
                        </div>
                        <div class="flex flex-col items-end justify-center gap-2 shrink-0">
                            <button onclick="payInvoiceItem('${compra.id}', '${descricaoTexto}', ${valParcela}, '${card.id}')" 
                                class="bg-primary hover:brightness-110 text-on-primary font-bold text-xs px-5 py-2.5 rounded-xl transition-all active:scale-95 shadow-lg">
                                Pago
                            </button>
                            <button onclick="deleteCardTransaction('${compra.id}')" class="text-error/70 hover:text-error text-[11px] flex items-center gap-1 active:scale-95 transition-all mt-1">
                                <span class="material-symbols-outlined text-[13px]">delete</span> Excluir
                            </button>
                        </div>
                    </div>
                `;
            });

            if (itemsMarkup === '') {
                invoiceListEl.innerHTML = `
                    <div class="glass-card p-8 rounded-xl text-center text-on-surface-variant/60 text-sm">
                        Nenhum gasto ativo neste cartão.
                    </div>
                `;
            } else {
                invoiceListEl.innerHTML = itemsMarkup;
            }

            // O Gasto Total do cartão é a soma real de todas as transações (compras - pagamentos)
            // Como compras são negativas e pagamentos positivos, a soma direta dá o saldo negativo do cartão.
            const rawBalance = cardTransacoes.reduce((sum, t) => sum + Number(t.valor), 0);
            const cardUsed = Math.abs(Math.min(rawBalance, 0)); // Apenas o que está devendo (se for > 0, tem crédito sobrando)

            const limiteTotal = Number(card.limite);
            const disponivel = limiteTotal - cardUsed;

            saldoEl.innerText = formatCurrency(Math.max(0, disponivel));
            utilizadoEl.innerText = `Valor gasto: ${formatCurrency(cardUsed)}`;
            totalEl.innerText = `Limite: ${formatCurrency(limiteTotal)}`;

            if (progressBar) {
                const pct = limiteTotal > 0 ? Math.min(100, (cardUsed / limiteTotal) * 100) : 0;
                progressBar.style.width = `${pct}%`;
            }
        }

        // Quitar Item da Fatura
        async function payInvoiceItem(transacaoId, descricao, valorParcela, cardId) {
            if (!confirm(`Confirmar o pagamento de R$ ${valorParcela.toFixed(2).replace('.', ',')} para a parcela de: ${descricao}?`)) {
                return;
            }
            try {
                // 1. Insere despesa comum (saída) na conta corrente principal para refletir que o dinheiro saiu do banco
                await window.db.transacoes.add({
                    descricao: `Pagamento Fatura: ${descricao}`,
                    valor: -Math.abs(valorParcela),
                    categoria: 'Fatura Cartão',
                    parcelas: 1,
                    data: new Date().toISOString()
                });

                // 2. Insere um "pagamento" (entrada) associado ao cartão para liberar limite
                await window.db.transacoes.add({
                    descricao: `Pgto Parcela [${transacaoId}]`,
                    valor: Math.abs(valorParcela),
                    cartao_id: cardId,
                    categoria: 'Fatura Cartão',
                    parcelas: 1,
                    data: new Date().toISOString()
                });

                alert('Parcela paga e limites atualizados com sucesso!');
                
                // Recarregar os dados remotos
                const [transacoes] = await Promise.all([
                    window.db.transacoes.list(),
                    window.updateMetrics ? window.updateMetrics() : Promise.resolve()
                ]);
                allTransactions = transacoes;
                await loadCards(); // Recarrega a tela com os novos dados

            } catch (err) {
                alert('Erro ao processar o pagamento: ' + err.message);
            }
        }

        // Excluir Dívida/Compra do Cartão
        async function deleteCardTransaction(transacaoId) {
            if (!confirm('Tem certeza que deseja excluir este gasto do cartão? A exclusão é permanente.')) {
                return;
            }
            try {
                // Remove a compra principal
                await window.db.transacoes.remove(transacaoId);
                
                // Remove todos os pagamentos atrelados a esta compra (se houver)
                const pagamentosRelacionados = allTransactions.filter(t => t.descricao && t.descricao.includes(transacaoId));
                for (const p of pagamentosRelacionados) {
                    await window.db.transacoes.remove(p.id);
                }

                alert('Gasto excluído com sucesso!');
                
                // Recarregar os dados remotos
                const [transacoes] = await Promise.all([
                    window.db.transacoes.list(),
                    window.updateMetrics ? window.updateMetrics() : Promise.resolve()
                ]);
                allTransactions = transacoes;
                await loadCards(); // Recarrega a tela com os novos dados
            } catch (err) {
                alert('Erro ao processar a exclusão: ' + err.message);
            }
        }

        // Carrega Todos os Cartões e Transações
        async function loadCards() {
            try {
                const carousel = document.getElementById('card-carousel');
                const indicators = document.getElementById('card-indicators');

                const [cards, transacoes] = await Promise.all([
                    window.db.cartoes.list(),
                    window.db.transacoes.list()
                ]);

                currentCards = cards;
                allTransactions = transacoes;
                carousel.innerHTML = '';
                indicators.innerHTML = '';

                if (!cards.length) {
                    carousel.innerHTML = `<div class="flex items-center justify-center w-full py-12 text-on-surface-variant font-body-md">Nenhum cartão encontrado. Adicione um abaixo.</div>`;
                    document.getElementById('saldo-disponivel').innerText = 'R$ 0,00';
                    document.getElementById('limite-utilizado').innerText = 'Valor gasto: R$ 0,00';
                    document.getElementById('limite-total').innerText = 'Limite: R$ 0,00';
                    document.getElementById('invoice-items-list').innerHTML = `<div class="glass-card p-6 rounded-xl text-center text-on-surface-variant/60 text-sm">Nenhum cartão ativo.</div>`;
                    const progressBar = document.querySelector('.h-2.w-full .h-full');
                    if (progressBar) progressBar.style.width = '0%';
                    return;
                }

                // Cria cada slide
                cards.forEach((card, i) => {
                    const cardTransacoes = transacoes.filter(t => t.cartao_id === card.id);
                    // A fatura visual no card (Apenas indicativo)
                    const rawBalance = cardTransacoes.reduce((s, t) => s + Number(t.valor), 0);
                    const cardInvoice = Math.abs(Math.min(rawBalance, 0));

                    const slide = createCardSlide(card, i === 0, cardInvoice);
                    carousel.appendChild(slide);

                    const dot = document.createElement('div');
                    dot.className = i === 0 ? 'w-6 h-1 rounded-full bg-primary transition-all duration-300' : 'w-1.5 h-1 rounded-full bg-surface-container-highest transition-all duration-300';
                    indicators.appendChild(dot);
                });

                // Sincroniza e define o cartão selecionado
                updateActiveCardDetails();

                // Evento de rolagem para sincronizar dots e atualizar dados dinamicamente
                carousel.addEventListener('scroll', () => {
                    const dots = indicators.querySelectorAll('div');
                    const slideWidth = carousel.querySelector('.snap-center')?.offsetWidth || carousel.clientWidth;
                    const idx = Math.round(carousel.scrollLeft / (slideWidth + 16)); // 16px é o gap de espaçamento
                    if (idx !== activeCardIndex && idx >= 0 && idx < currentCards.length) {
                        activeCardIndex = idx;
                        dots.forEach((dot, j) => {
                            dot.className = j === idx ? 'w-6 h-1 rounded-full bg-primary transition-all duration-300' : 'w-1.5 h-1 rounded-full bg-surface-container-highest transition-all duration-300';
                        });
                        updateActiveCardDetails();
                    }
                });
            } catch (err) {
                console.error("Erro no loadCards:", err);
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // Carrega foto de perfil no topo
            const savedProfilePic = localStorage.getItem('profile_picture');
            if (savedProfilePic) {
                const img = document.getElementById('profile-img-top');
                if (img) img.src = savedProfilePic;
            }

            // Loop de carregamento do DB
            let attempts = 0;
            const waitForDb = setInterval(() => {
                if (window.db && window.db.cartoes) {
                    clearInterval(waitForDb);
                    loadCards();
                }
                if (++attempts > 50) clearInterval(waitForDb);
            }, 100);

            // Novo cartão form submit
            const form = document.getElementById('novo-cartao-form');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const titularInput = document.getElementById('card-titular');
                    const titular = titularInput ? titularInput.value.trim() : '';
                    
                    const nome = document.getElementById('card-nome').value.trim();
                    const limite = parseFloat(document.getElementById('card-limite').value);
                    const fechamentoInput = document.getElementById('card-fechamento');
                    const vencimentoInput = document.getElementById('card-vencimento');
                    const fechamento_dia = fechamentoInput ? parseInt(fechamentoInput.value) : 15;
                    const vencimento_dia = vencimentoInput ? parseInt(vencimentoInput.value) : 20;

                    if (!nome || isNaN(limite)) return;
                    const btn = form.querySelector('button[type="submit"]');
                    btn.disabled = true;
                    btn.innerText = 'Adicionando...';
                    try {
                        const novoCard = await window.db.cartoes.add({ nome, limite, fechamento_dia, vencimento_dia });
                        
                        if (titular && novoCard && novoCard.id) {
                            const titulares = JSON.parse(localStorage.getItem('card_titulares') || '{}');
                            titulares[novoCard.id] = titular;
                            localStorage.setItem('card_titulares', JSON.stringify(titulares));
                        }
                        
                        form.reset();
                        activeCardIndex = 0; // Reseta para o primeiro slide
                        await loadCards();
                    } catch (err) {
                        alert('Erro ao adicionar cartão: ' + err.message);
                    } finally {
                        btn.disabled = false;
                        btn.innerText = 'Adicionar Cartão';
                    }
                });
            }
        });
    </script>
</body>
</html>
